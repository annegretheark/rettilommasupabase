<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Velg nytt passord – HovslagerSystem</title>
  <style>
    :root{--bg:#0f172a;--card:#111827;--soft:#1f2937;--text:#f8fafc;--muted:#94a3b8;--accent:#d6a84f;--danger:#ef4444;--ok:#22c55e;--border:#334155}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;background:linear-gradient(135deg,#0f172a,#111827);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .card{width:min(100%,430px);background:rgba(17,24,39,.96);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
    .brand{display:flex;gap:14px;align-items:center;margin-bottom:18px}
    .logo{width:58px;height:58px;border-radius:14px;background:#fff;display:grid;place-items:center;color:#111827;font-weight:900;font-size:22px}
    h1{font-size:1.55rem;margin:0 0 4px}
    p{line-height:1.5}.muted{color:var(--muted)}
    label{display:block;font-size:14px;color:var(--muted);margin:12px 0}
    input{width:100%;min-height:48px;margin-top:5px;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:#0b1220;color:var(--text);font-size:16px}
    input:focus{outline:2px solid var(--accent);outline-offset:1px}
    button,a.button{width:100%;min-height:48px;border:0;border-radius:10px;background:var(--accent);color:#111827;font-weight:750;padding:11px 14px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;margin-top:12px}
    button:hover,a.button:hover{filter:brightness(1.08)}button:disabled{opacity:.55;cursor:not-allowed}
    a.button.secondary{background:#334155;color:var(--text)}
    .msg{border:1px solid var(--border);padding:11px;border-radius:10px;margin-top:14px;background:#0b1220;line-height:1.45}
    .msg.ok{border-color:var(--ok)}.msg.err{border-color:var(--danger);color:#fecaca}.hidden{display:none!important}
  </style>

<link rel="stylesheet" href="cookie-consent.css">
<script defer src="cookie-consent.js"></script>
  <script src="js/i18n.js?v=20260722-full-sv-en"></script>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="logo" aria-hidden="true">HS</div>
      <div><h1>Velg nytt passord</h1><div class="muted">HovslagerSystem</div></div>
    </div>

    <p id="intro" class="muted">Kontrollerer tilbakestillingslenken …</p>

    <form id="resetForm" class="hidden" novalidate>
      <label>Nytt passord
        <input id="password" type="password" autocomplete="new-password" minlength="8" required placeholder="Minst 8 tegn">
      </label>
      <label>Gjenta nytt passord
        <input id="passwordConfirm" type="password" autocomplete="new-password" minlength="8" required placeholder="Skriv passordet på nytt">
      </label>
      <button id="saveBtn" type="submit">Lagre nytt passord</button>
    </form>

    <div id="message" class="msg hidden" role="status" aria-live="polite"></div>
    <a id="loginLink" class="button secondary hidden" href="index.html">Til innlogging</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/hovslager/config.js"></script>
  <script>
  (function(){
    const form = document.getElementById('resetForm');
    const intro = document.getElementById('intro');
    const message = document.getElementById('message');
    const loginLink = document.getElementById('loginLink');
    const saveBtn = document.getElementById('saveBtn');
    const password = document.getElementById('password');
    const passwordConfirm = document.getElementById('passwordConfirm');

    function showMessage(text, type){
      message.textContent = text;
      message.className = 'msg ' + (type || '');
    }

    function showReady(){
      intro.textContent = 'Skriv inn et nytt passord for kontoen din.';
      form.classList.remove('hidden');
      password.focus();
    }

    async function initialize(){
      const sb = window.supabaseClient;
      if(!sb){
        intro.textContent = 'Kunne ikke starte passordtilbakestilling.';
        showMessage(window.hovConfigFeil || 'Supabase er ikke konfigurert.', 'err');
        loginLink.classList.remove('hidden');
        return;
      }

      try{
        // PKCE-lenker kan inneholde en code i query-strengen.
        const params = new URLSearchParams(location.search);
        const code = params.get('code');
        if(code){
          const result = await sb.auth.exchangeCodeForSession(code);
          if(result.error) throw result.error;
        }

        // Implicit recovery-lenker behandles automatisk av detectSessionInUrl.
        const sessionResult = await sb.auth.getSession();
        if(sessionResult.error) throw sessionResult.error;

        if(sessionResult.data.session){
          showReady();
          return;
        }

        // Gi Supabase et kort øyeblikk til å behandle URL-fragmentet.
        const { data: listener } = sb.auth.onAuthStateChange(function(event, session){
          if((event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') && session){
            listener.subscription.unsubscribe();
            showReady();
          }
        });

        setTimeout(function(){
          if(form.classList.contains('hidden')){
            intro.textContent = 'Tilbakestillingslenken er ugyldig eller utløpt.';
            showMessage('Be om en ny passordlenke fra innloggingssiden.', 'err');
            loginLink.classList.remove('hidden');
            listener.subscription.unsubscribe();
          }
        }, 2500);
      }catch(err){
        intro.textContent = 'Tilbakestillingslenken kunne ikke brukes.';
        showMessage(err.message || String(err), 'err');
        loginLink.classList.remove('hidden');
      }
    }

    form.addEventListener('submit', async function(event){
      event.preventDefault();
      const p1 = password.value;
      const p2 = passwordConfirm.value;

      if(p1.length < 8){
        showMessage('Passordet må være minst 8 tegn.', 'err');
        return;
      }
      if(p1 !== p2){
        showMessage('Passordene er ikke like.', 'err');
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Lagrer …';
      showMessage('Oppdaterer passordet …', '');

      const { error } = await window.supabaseClient.auth.updateUser({ password: p1 });
      if(error){
        showMessage(error.message, 'err');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Lagre nytt passord';
        return;
      }

      form.classList.add('hidden');
      intro.textContent = 'Passordet er oppdatert.';
      showMessage('Du kan nå logge inn med det nye passordet.', 'ok');
      loginLink.classList.remove('hidden');
      await window.supabaseClient.auth.signOut();
    });

    initialize();
  })();
  </script>
</body>
</html>
