<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Be om testversjon – Rett i Lomma</title><style>body{margin:0;background:#071522;color:#e8f3ff;font:16px Arial,sans-serif}.wrap{max-width:650px;margin:7vh auto;padding:24px}.card{background:#0c2235;border:1px solid #2d5c80;border-radius:18px;padding:28px;box-shadow:0 18px 55px #0007}h1{margin-top:0}label{display:block;margin:15px 0 6px;font-weight:700}input{box-sizing:border-box;width:100%;padding:13px;border-radius:9px;border:1px solid #567089;background:#071522;color:#fff;font-size:16px}button,.btn{display:inline-block;margin-top:18px;padding:13px 18px;border:0;border-radius:9px;background:#25b66f;color:#fff;font-weight:800;font-size:16px;cursor:pointer;text-decoration:none}.secondary{background:#1976d2}.muted{color:#b7c9da}.result{display:none;margin-top:20px;padding:16px;background:#071522;border-radius:10px;word-break:break-all}.err{color:#ffb4b4}</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/hovslager/config.js"></script><script src="js/i18n.js?v=20260722-full-sv-en"></script></head><body><main class="wrap"><section class="card"><h1>Be om testversjon</h1><p class="muted">Opprett en personlig invitasjonslenke til 30 dagers gratis test. Lenken vises her, slik at du selv bestemmer hvordan den deles. Vi sender ikke invitasjonen til andre.</p><form id="f"><label for="navn">Navn</label><input id="navn" autocomplete="name"><label for="epost">E-post</label><input id="epost" type="email" autocomplete="email" required><button id="submit">Opprett invitasjon</button></form><div id="msg" class="result"></div><p><a class="btn secondary" href="landing.html">Tilbake</a></p></section></main><script>
const f=document.getElementById('f'),msg=document.getElementById('msg'),btn=document.getElementById('submit');
f.addEventListener('submit',async e=>{e.preventDefault();msg.style.display='block';msg.className='result';msg.textContent='Oppretter invitasjon …';btn.disabled=true;try{const {data,error}=await window.supabaseClient.functions.invoke('opprett-testinvitasjon',{body:{navn:navn.value.trim(),epost:epost.value.trim(),base_url:location.origin}});if(error)throw error;if(!data?.ok)throw new Error(data?.error||'Ukjent feil');msg.innerHTML='<strong>Invitasjonen er klar</strong><p><a id="link" href="'+data.invite_url+'">'+data.invite_url+'</a></p><button type="button" id="copy">Kopier lenken</button>';document.getElementById('copy').onclick=async()=>{await navigator.clipboard.writeText(data.invite_url);document.getElementById('copy').textContent='Kopiert';};}catch(err){msg.classList.add('err');msg.textContent='Kunne ikke opprette invitasjonen: '+(err.message||err);}finally{btn.disabled=false;}});
</script></body></html>
