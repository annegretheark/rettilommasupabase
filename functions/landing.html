<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rett i Lomma Hovslager</title>
<style>
body{font-family:Arial,sans-serif;background:#151819;color:#f3f4f6;margin:0;padding:20px}
.kort{max-width:900px;margin:auto;background:#171a1b;padding:25px;border-radius:14px;text-align:center}
img{max-width:100%;border-radius:12px}
h1{margin-top:15px}
.knapp{display:block;margin:12px auto;padding:16px 20px;width:280px;border-radius:10px;text-decoration:none;color:white;background:#1f6feb;font-size:18px}
.secondary{background:#475569}
.success{background:#0f766e}
.info{color:#cbd5e1;margin-top:10px}


/* MOBILAPP-FIX 2026-07-02: kort/listevisning på telefon */
@media(max-width:700px){
  body{background:#0f172a;}
  .wrap{padding:8px;max-width:100%;}
  .card{border-radius:18px;padding:12px;margin:10px 0;box-shadow:0 8px 24px rgba(0,0,0,.22)}
  .topbar{position:sticky;top:0;z-index:80;background:rgba(15,23,42,.96);border-bottom:1px solid var(--border);padding:10px 8px;margin:0 -8px 8px;backdrop-filter:blur(12px)}
  .tabs{position:sticky;top:72px;z-index:70;background:rgba(15,23,42,.96);margin:0 -8px 10px;padding:8px;overflow-x:auto;flex-wrap:nowrap;scroll-snap-type:x proximity;border-bottom:1px solid var(--border)}
  .tabs button{flex:0 0 auto;min-width:112px;scroll-snap-align:start;min-height:46px}
  .grid{grid-template-columns:1fr!important;gap:10px}
  .formgrid>label,.formgrid>.wide,.image-preview,.col-3{grid-column:1 / -1!important}
  input,select,textarea,button,.small-btn{font-size:16px;min-height:48px}
  .actions{display:grid!important;grid-template-columns:1fr;gap:8px;margin:10px 0}
  .actions button,.actions .small-btn{width:100%;justify-content:center}
  #kundeList table,#hestList table,#jobbList table,#prisList table,#fakturaList table,#appFakturaList table{min-width:0!important;width:100%;border-collapse:separate;border-spacing:0 10px;margin-top:8px}
  #kundeList thead,#hestList thead,#jobbList thead,#prisList thead,#fakturaList thead,#appFakturaList thead{display:none}
  #kundeList tbody,#hestList tbody,#jobbList tbody,#prisList tbody,#fakturaList tbody,#appFakturaList tbody{display:block}
  #kundeList tr,#hestList tr,#jobbList tr,#prisList tr,#fakturaList tr,#appFakturaList tr{display:block;background:#0b1220;border:1px solid var(--border);border-radius:16px;padding:10px;margin:0 0 10px;box-shadow:0 6px 18px rgba(0,0,0,.18)}
  #kundeList tr.click-row,#hestList tr.click-row,#jobbList tr.click-row,#prisList tr.click-row{cursor:pointer}
  #kundeList td,#hestList td,#jobbList td,#prisList td,#fakturaList td,#appFakturaList td{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border:0;border-bottom:1px solid rgba(51,65,85,.65);padding:8px 2px;text-align:right;word-break:break-word}
  #kundeList td:last-child,#hestList td:last-child,#jobbList td:last-child,#prisList td:last-child,#fakturaList td:last-child,#appFakturaList td:last-child{border-bottom:0}
  #kundeList td::before,#hestList td::before,#jobbList td::before,#prisList td::before,#fakturaList td::before,#appFakturaList td::before{content:attr(data-label);font-weight:800;color:var(--muted);text-align:left;min-width:96px;max-width:44%}
  #fakturaList td.actions,#appFakturaList td.actions{display:grid!important;grid-template-columns:1fr;min-width:0;white-space:normal;gap:8px;text-align:left;padding-top:10px}
  #fakturaList td.actions::before,#appFakturaList td.actions::before{display:none}
  #fakturaList .small-btn,#appFakturaList .small-btn{width:100%;min-height:44px}
  .thumb.small{width:76px;height:58px}.thumb{max-width:160px;height:auto}
}

</style>

<link rel="stylesheet" href="cookie-consent.css">
<script defer src="cookie-consent.js"></script>
  <script src="js/i18n.js?v=20260722-full-sv-en"></script>
</head>
