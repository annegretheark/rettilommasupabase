<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aktiver testversjon – Rett i Lomma</title><style>body{margin:0;background:#071522;color:#e8f3ff;font:16px Arial,sans-serif}.wrap{max-width:650px;margin:7vh auto;padding:24px}.card{background:#0c2235;border:1px solid #2d5c80;border-radius:18px;padding:28px}h1{margin-top:0}label{display:block;margin:14px 0 6px;font-weight:700}input{box-sizing:border-box;width:100%;padding:13px;border-radius:9px;border:1px solid #567089;background:#071522;color:#fff;font-size:16px}button{margin-top:18px;padding:13px 18px;border:0;border-radius:9px;background:#25b66f;color:white;font-weight:800;font-size:16px}.muted{color:#b7c9da}.msg{margin-top:18px}.err{color:#ffb4b4}</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/hovslager/config.js"></script><script src="js/i18n.js?v=20260722-full-sv-en"></script></head><body><main class="wrap"><section class="card"><h1>Aktiver 30 dagers testversjon</h1><p class="muted">Opprett firma og innlogging. Du mottar én aktiverings-e-post for å velge passord.</p><form id="f"><label>Navn</label><input id="navn" required><label>Firmanavn</label><input id="firmanavn" required><label>E-post</label><input id="epost" type="email" required><button id="submit">Start testperioden</button></form><div id="msg" class="msg"></div></section></main><script>
const code=new URLSearchParams(location.search).get('code')||'';const f=document.getElementById('f'),m=document.getElementById('msg'),b=document.getElementById('submit');if(!code){m.className='msg err';m.textContent='Invitasjonskoden mangler.';b.disabled=true;}
f.addEventListener('submit',async e=>{e.preventDefault();m.className='msg';m.textContent='Oppretter konto …';b.disabled=true;try{const {data,error}=await window.supabaseClient.functions.invoke('aksepter-testinvitasjon',{body:{code,navn:navn.value.trim(),firmanavn:firmanavn.value.trim(),epost:epost.value.trim()}});if(error)throw error;if(!data?.ok)throw new Error(data?.error||'Ukjent feil');m.innerHTML='<strong>Testkontoen er opprettet.</strong><p>'+data.message+'</p><p>Testperioden varer til '+data.trial_end+'.</p>';}catch(err){m.className='msg err';m.textContent='Kunne ikke aktivere invitasjonen: '+(err.message||err);b.disabled=false;}});
</script></body></html>
